<!doctype html>

    <title>ToolVine Mentors | Raising Godly Mentors and Leaders</title>

    <!-- ============ Critical inline splash (paints before React mounts) ============ -->
    <style>
      .tv-initial-splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #FAFAF9;
        z-index: 1;
      }
      .tv-initial-splash svg {
        width: 72px;
        height: 72px;
        animation: tv-initial-grow 1200ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }
      @keyframes tv-initial-grow {
        0%   { transform: scale(0.75); opacity: 0; }
        60%  { opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .tv-initial-splash svg { animation: none; }
      }
    </style>

    <!-- ============ Favicons ============ -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
